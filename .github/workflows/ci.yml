name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Validate agents and models
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Run tests
        run: npm test

      - name: Export all platforms
        run: |
          npm run export:opencode
          npm run export:claude
          npm run export:cursor
          npm run export:copilot
          npm run export:aider
          npm run export:gemini
